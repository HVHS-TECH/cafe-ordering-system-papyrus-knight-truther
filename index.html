<html>
<head>
<title>MTT-Brand Burger Emporium</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="Main">

   <div class="header">
      <h1>MTT-Brand Burger Emporium</h1>
   </div>

 <div class="Menu">
    <div class="MenuTitle"><h1>MENU</h1></div>

    <div class="Starfait">
        <img src="./images/Starfait_item.webp" height="150px">
        <p>Starfait 60G</p>

<form onSubmit="return false" id="userQuantityForm" >
      <label for="quantity">Quantity:</label>
      <input type="number" id="quantityForm" name="quantity" min="1" max="20" required>
      <input type="submit" onClick="addToBasket(TOBY, quantityForm)">
    </form>
    </div>

    <div class="Glamburger">
      <img src="./images/Glamburger_item.webp" height="150px">
      <p>Glamburger 120G</p>
      <form onSubmit="return false" id="userQuantityForm2"></form>
      <label for="quantity">Quantity:</label>
      <input type="number" id="quantityForm2" name="quantity" min="1" max="20" required>
      <input type="submit" onClick="addToBasket(SMILK, quantityForm2)">
    </form>
    </div>

    <div class="LegendaryHero">
      <img src="./images/Legendary_Hero_item.webp" height="150px">
      <p>Glamburger 120G</p>
      <form onSubmit="return false" id="userQuantityForm3"></form>
      <label for="quantity">Quantity:</label>
      <input type="number" id="quantityForm3" name="quantity" min="1" max="20" required>
      <input type="submit" onClick="addToBasket(SMILK, quantityForm3)">
    </form>
    </div>
 </div>

 <div class="Cart">
    <h1>CART</h1>
    <div id="Basket">

    </div>
    
      <form onSubmit="return false" id="userMoneyForm" >
      <label for="money">Your money:</label>
      <input type="number" id="moneyForm" name="money" min="1" max="500" required>
      <input type="submit" name="Pay" onClick="getFormInput()">
    </form>
 </div>

   
   
 


<script src="script.js"></script>
</body>
</html>
