
<html>
<head>
<title>MTT-Brand Burger Emporium</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="Main">

   <div class="header">
      <h1>MTT-Brand Burger Emporium</h1>
   </div>

 <div class="Menu">
    <div class="MenuTitle"><h1>MENU</h1></div>

    <div class="Toby">
        <img src="./images/Toby.png" width="150px">
        <p>Toby Fox! $5</p>
    

<form onSubmit="return false" min="1" max="20" required>
      <label for="quantity">Quantity:</label>
      <input type="number" id="quantityForm" name="quantity">
      <input type="submit" onClick="addToBasket(TOBY, quantityForm)">
    </form>
    </div>

    <div class="Smilk">
      <img src="./images/Shadow_Milk.png" width="150px">
      <p>Shadow Milk! $4.50</p>
      <form onSubmit="return false" min="1" max="20" required></form>
      <label for="quantity">Quantity:</label>
      <input type="number" id="quantityForm2" name="quantity">
      <input type="submit" onClick="addToBasket(SMILK, quantityForm2)">
    </form>
    </div>
 </div>

 <div class="Cart">
    <h1>CART</h1>
    <div id="Basket">

    </div>
 </div>

 <div class="Burgerpants">
    <img src="./images/textBox.png" width="1000px">
 </div>

</div>

<script src="script.js"></script>
</body>
</html>
