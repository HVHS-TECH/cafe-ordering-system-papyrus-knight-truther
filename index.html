<!DOCTYPE html>
<html>
<head>
<title>MTT-Brand Burger Emporium</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="Main">

   <div class="header">
      <h1>MTT-Brand Burger Emporium</h1>
   </div>

 <div class="Menu">
    <h1>MENU</h1>

    <button onclick="addTobyToBasket()">
        <img src="./images/Toby.png" width="150px">
    </button>

<form onSubmit="return false" min="1" max="20" required>
      <label for="quantity">Quantity:</label>
      <input type="number" id="quantityForm" name="quantity">
      <input type="submit" onClick="getFormInput()">
    </form>

    <button onclick="addSmilkToBasket()">
        <img src="./images/Shadow_Milk.png" width="150px">
    </button>
    

 </div>

 <div class="Cart">
    <h1>CART</h1>
    <div id="Basket">
        
    </div>
 </div>

 <div class="Burgerpants">
    <img src="./images/textBox.png" width="1000px">
 </div>

</div>

<script src="script.js"></script>
</body>
</html>
